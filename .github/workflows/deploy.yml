name: Deploy App to EC2

on:
  push:
    paths:
      - 'week2-cicd/app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Archive app
        run: zip -r app.zip week2-cicd/app

      - name: Copy to EC2 via SSH
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "app.zip"
          target: "/home/ubuntu/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            unzip -o app.zip
            sudo rm -rf /var/www/html/*
            sudo cp -r week2-cicd/app/* /var/www/html/
            sudo systemctl restart apache2
